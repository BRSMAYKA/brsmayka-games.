<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو ألعاب BRSMAYKA - النسخة المطورة</title>
    <style>
        :root { 
            --primary: #0088ff; 
            --secondary: #ff3333; 
            --bg: #050505; 
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            text-align: center;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
        }

        /* تنسيق الهيدر مع العداد بجانب العنوان */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .header-container h1 {
            font-size: 2.2rem;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary);
            margin: 0;
        }

        .visitor-counter {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }

        .game-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 200px;
            border-radius: 20px;
            padding: 25px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 136, 255, 0.3);
        }

        /* ألوان X و O */
        .cell.x { color: var(--secondary); text-shadow: 0 0 10px var(--secondary); }
        .cell.o { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 1000; }
        .modal-content { 
            background: #111; margin: 5vh auto; width: 90%; max-width: 450px; padding: 30px; 
            border-radius: 30px; border: 2px solid var(--primary); position: relative;
        }

        #arena { background: #000; border-radius: 20px; height: 250px; position: relative; overflow: hidden; border: 1px solid #333; }
        
        #target { 
            width: 40px; height: 40px; background: yellow; border-radius: 50%; 
            position: absolute; cursor: pointer; display: none; 
            box-shadow: 0 0 20px yellow; opacity: 0; transition: opacity 0.1s;
        }

        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body onclick="initAudio()">

            <span style="font-size: 12px; color: #aaa;">الزوار:</span>
            <div id="sfcj1hadcun8xqdfhbzttteef2bq7wl376p"></div>
