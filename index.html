<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو ألعاب BRSMAYKA - نسخة الروبوت</title>
    <style>
        :root { --primary: #00ffcc; --bg: #0a0a0a; --card: #161616; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .game-card {
            background: var(--card); border: 2px solid #333; width: 200px; border-radius: 15px;
            padding: 20px; transition: 0.3s; cursor: pointer;
        }
        .game-card:hover { transform: scale(1.05); border-color: var(--primary); }
        .play-btn { background: var(--primary); border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* تصميم طاولة X-O */
        .xo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 250px; margin: 20px auto; }
        .cell { width: 80px; height: 80px; background: #333; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; cursor: pointer; border-radius: 10px; }
        .cell.x { color: #ff0055; }
        .cell.o { color: var(--primary); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding-top: 50px; }
        .modal-content { background: #222; margin: auto; width: 90%; max-width: 450px; padding: 30px; border-radius: 20px; border: 2px solid var(--primary); position: relative; }
        .close { position: absolute; left: 20px; top: 10px; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🎮 ستوديو BRSMAYKA الذكي</h1>
    <p>تحدى الروبوت في ألعابنا الجديدة!</p>

    <div class="container">
        <div class="game-card" onmouseenter="playTick()" onclick="openGame('xo')">
            <span style="font-size:50px">❌</span>
            <h3>X-O ضد الروبوت</h3>
            <button class="play-btn">العب الآن</button>
        </div>
        <div class="game-card" onmouseenter="playTick()" onclick="openGame('ball')">
            <span style="font-size:50px">🎾</span>
            <h3>صيد الكرة</h3>
            <button class="play-btn">العب الآن</button>
        </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGame()">&times;</span>
            <div id="gameArea"></div>
        </div>
    </div>

<script>
    // نظام الصوت
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(f, d) {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.frequency.value = f; o.connect(g); g.connect(audioCtx.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + d); o.stop(audioCtx.currentTime + d);
    }
    function playTick() { playSound(800, 0.05); }
    function playWin() { playSound(500, 0.3); playSound(700, 0.5); }

    let board = ["", "", "", "", "", "", "", "", ""];
    let gameActive = true;

    function openGame(game) {
        const area = document.getElementById('gameArea');
        document.getElementById('gameModal').style.display = "block";
        if(game === 'xo') {
            board = ["", "", "", "", "", "", "", "", ""]; gameActive = true;
            renderXO();
        } else if(game === 'ball') {
            area.innerHTML = `<h3>اصطاد الكرة الصفراء!</h3><div id="arena" style="height:200px; position:relative; background:#111; overflow:hidden; border-radius:10px;">
                <div id="target" onclick="hit()" style="width:40px; height:40px; background:yellow; border-radius:50%; position:absolute; cursor:pointer; top:50px; left:50px; transition:0.2s;"></div>
            </div><p id="score">النقاط: 0</p>`;
        }
    }

    // --- منطق X-O ضد الروبوت ---
    function renderXO() {
        const area = document.getElementById('gameArea');
        area.innerHTML = `<h3>أنت (X) ضد الروبوت (O)</h3><div class="xo-grid">${board.map((v, i) => `<div class="cell ${v.toLowerCase()}" onclick="playerMove(${i})">${v}</div>`).join('')}</div><p id="status"></p>`;
    }

    function playerMove(i) {
        if(board[i] === "" && gameActive) {
            board[i] = "X";
            playSound(400, 0.1);
            checkWinner();
            if(gameActive) setTimeout(robotMove, 500);
            renderXO();
        }
    }

    function robotMove() {
        let empty = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
        if(empty.length > 0) {
            let move = empty[Math.floor(Math.random() * empty.length)];
            board[move] = "O";
            playSound(300, 0.1);
            checkWinner();
            renderXO();
        }
    }

    function checkWinner() {
        const winPatterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for(let p of winPatterns) {
            if(board[p[0]] && board[p[0]] === board[p[1]] && board[p[0]] === board[p[2]]) {
                gameActive = false;
                document.getElementById('status').innerText = board[p[0]] === "X" ? "مبروك! فزت على الروبوت 🏆" : "الروبوت فاز! حاول ثانية 🤖";
                if(board[p[0]] === "X") playWin();
                return;
            }
        }
        if(!board.includes("")) { gameActive = false; document.getElementById('status').innerText = "تعادل! 🤝"; }
    }

    // --- لعبة صيد الكرة ---
    let points = 0;
    function hit() {
        points++;
        document.getElementById('score').innerText = "النقاط: " + points;
        const t = document.getElementById('target');
        t.style.top = Math.random() * 150 + "px";
        t.style.left = Math.random() * 350 + "px";
        playSound(600, 0.1);
    }

    function closeGame() { document.getElementById('gameModal').style.display = "none"; }
</script>

</body>
