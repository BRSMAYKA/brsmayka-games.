<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5416315671829266" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA GAMING</title>
    <style>
        :root { --primary: #00ffcc; --bg: #0a0a0a; --accent-green: #00ff44; --error-red: #ff3333; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        
        .brand-name { color: var(--accent-green); text-shadow: 0 0 15px var(--accent-green); font-size: 2.5rem; margin: 10px 0; font-weight: 900; }
        #splash-screen { position: fixed; inset: 0; background: var(--bg); z-index: 30000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #persistent-score { position: fixed; top: 15px; left: 15px; background: rgba(0, 255, 68, 0.1); border: 1px solid var(--accent-green); padding: 10px; border-radius: 8px; z-index: 10001; }

        .section-title { color: var(--primary); margin-top: 30px; border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 1.2rem; text-transform: uppercase; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 20px; }
        .game-card { background: #111; border: 1px solid #333; width: 145px; border-radius: 15px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--accent-green); transform: translateY(-5px); }

        /* Rating Styles */
        .rating-box { background: #111; border: 1px solid var(--accent-green); border-radius: 20px; padding: 20px; max-width: 400px; margin: 40px auto; }
        .stars-container { font-size: 35px; cursor: pointer; margin-bottom: 10px; }
        .star { color: #333; transition: 0.2s; }
        .star.active { color: gold; text-shadow: 0 0 10px gold; }
        .rating-info { font-size: 14px; color: #888; }

        /* Modal & Games Styles */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #0f0f0f; margin: 5vh auto; width: 92%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); position: relative; }
        .wrong-bg { background: #660000 !important; border-color: #ff0000 !important; }
        #timer-bar { height: 8px; background: var(--accent-green); width: 100%; transition: 0.1s linear; border-radius: 10px; }
        .btn { background: var(--accent-green); color: #000; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 85%; margin: 5px; }
        
        .cell { background: #161616; border-radius: 12px; display: flex; align-items: center; justify-content: center; height: 75px; width: 75px; font-size: 38px; border: 1px solid #333; cursor: pointer; font-weight: 900; }
        .p-x { color: var(--accent-green); text-shadow: 0 0 10px var(--accent-green); }
        .p-o { color: var(--error-red); text-shadow: 0 0 10px var(--error-red); }
        .lvl-btn { padding: 6px 12px; font-size: 11px; cursor: pointer; border-radius: 5px; border: 1px solid var(--primary); background: transparent; color: white; margin: 2px; }
        .lvl-btn.active { background: var(--accent-green); color: black; }

        footer { margin-top: 60px; padding-bottom: 40px; border-top: 1px solid #222; }
    </style>
</head>
<body onload="loadSystem()">

    <div id="splash-screen">
        <h1 class="brand-name">BRSMAYKA OS</h1>
        <button class="btn" style="width:200px" onclick="bootSystem()">ENTER SYSTEM</button>
    </div>

    <div id="persistent-score">Points: <span id="total-points">0</span></div>
    
    <h1 class="brand-name">BRSMAYKA GAMING</h1>

    <h2 class="section-title">Mini Games</h2>
    <div class="container">
        <div class="game-card" onclick="start('xo')">🤖 <h3>XO AI</h3></div>
        <div class="game-card" onclick="start('math')">➗ <h3>Math</h3></div>
        <div class="game-card" onclick="start('mem')">🧠 <h3>Memory</h3></div>
        <div class="game-card" onclick="start('ball')">👻 <h3>Ghost</h3></div>
        <div class="game-card" onclick="start('tap')">⚡ <h3>Tap</h3></div>
    </div>

    <h2 class="section-title">Web Games (No Download)</h2>
    <div class="container">
        <div class="game-card" onclick="window.open('https://poki.com', '_blank')">🎮 <h3>Poki</h3></div>
        <div class="game-card" onclick="window.open('https://crazygames.com', '_blank')">🕹️ <h3>CrazyGames</h3></div>
        <div class="game-card" onclick="window.open('https://game-distribution.com', '_blank')">🌐 <h3>Web Games</h3></div>
    </div>

    <div class="rating-box">
        <h3 style="margin-top:0; color:var(--accent-green);">⭐ Rate Our System</h3>
        <div class="stars-container" id="star-box">
            <span class="star" onclick="rate(1)">★</span>
            <span class="star" onclick="rate(2)">★</span>
            <span class="star" onclick="rate(3)">★</span>
            <span class="star" onclick="rate(4)">★</span>
            <span class="star" onclick="rate(5)">★</span>
        </div>
        <div class="rating-info">
            Rating: <span id="rating-val">4.8</span>/5 | Voters: <span id="voters-count">1254</span>
        </div>
        <p id="thanks-msg" style="display:none; color:var(--primary); font-size:12px; margin-top:10px;">Saved forever!</p>
    </div>

    <footer>
        <p>Location: Morocco 🇲🇦</p>
    </footer>

    <div id="gameModal" class="modal">
        <div id="game-box" class="modal-content">
            <span style="position:absolute; right:20px; top:10px; font-size:30px; cursor:pointer;" onclick="stop()">&times;</span>
            <div id="timer-bar-container" style="width:100%; height:8px; background:#222; border-radius:10px; margin-bottom:15px;">
                <div id="timer-bar"></div>
            </div>
            <div id="game-view"></div>
            <div id="custom-result-overlay" style="display:none; position:absolute; inset:0; background:rgba(0,0,0,0.95); z-index:100; flex-direction:column; align-items:center; justify-content:center; border-radius:23px;">
                <h1 id="res-title"></h1>
                <p id="res-desc"></p>
                <button class="btn" onclick="hideResult()">PLAY AGAIN</button>
                <button class="btn" style="background:#333; color:white;" onclick="stop()">QUIT</button>
            </div>
        </div>
    </div>

    <script>
        let audioCtx, currentMode, score = 0, gameTimer, timeLeft, globalPoints = 0;
        let board = [], canPlay = true, difficulty = 'hard';

        function loadSystem() {
            globalPoints = parseInt(localStorage.getItem('brs_pts')) || 0;
            document.getElementById('total-points').innerText = globalPoints;
            initRating();
        }

        function bootSystem() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('splash-screen').style.display = 'none';
        }

        // --- RATING LOGIC ---
        function initRating() {
            let hasVoted = localStorage.getItem('brs_voted');
            let extra = parseInt(localStorage.getItem('brs_extra_v')) || 0;
            document.getElementById('voters-count').innerText = 1254 + extra;
            if(hasVoted) {
                highlightStars(localStorage.getItem('brs_user_choice'));
                document.getElementById('star-box').style.pointerEvents = "none";
                document.getElementById('thanks-msg').style.display = "block";
            }
        }
        function rate(n) {
            localStorage.setItem('brs_voted', 'true');
            localStorage.setItem('brs_user_choice', n);
            let extra = (parseInt(localStorage.getItem('brs_extra_v')) || 0) + 1;
            localStorage.setItem('brs_extra_v', extra);
            highlightStars(n);
            initRating();
        }
        function highlightStars(n) {
            let s = document.getElementsByClassName('star');
            for(let i=0; i<5; i++) s[i].classList.toggle('active', i < n);
        }

        // --- GAME ENGINE ---
        function start(mode) {
            currentMode = mode; score = 0; canPlay = true; board = Array(9).fill('');
            document.getElementById('game-box').classList.remove('wrong-bg');
            document.getElementById('gameModal').style.display = 'block';
            document.getElementById('custom-result-overlay').style.display = 'none';
            const view = document.getElementById('game-view'); view.innerHTML = '';
            
            timeLeft = 15;
            clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timer-bar').style.width = (timeLeft/15)*100 + '%';
                if(timeLeft <= 0) showResult('TIME OVER', 'Try Again!', false);
            }, 100);

            if(mode === 'xo') {
                view.innerHTML = `<div style="margin-bottom:10px;"><button class="lvl-btn ${difficulty==='easy'?'active':''}" onclick="difficulty='easy';start('xo')">Easy</button><button class="lvl-btn ${difficulty==='hard'?'active':''}" onclick="difficulty='hard';start('xo')">Hard</button></div><div id="xo-grid" style="display:grid; grid-template-columns:repeat(3,75px); gap:8px; justify-content:center;"></div>`;
                for(let i=0; i<9; i++) {
                    const c = document.createElement('div'); c.className = 'cell'; c.id = 'c'+i;
                    c.onclick = () => { if(canPlay && board[i]==='') { board[i]='X'; c.innerText='X'; c.classList.add('p-x'); canPlay=false; if(!checkWin(board,'X')) { if(board.includes('')) setTimeout(aiMove, 400); else showResult('DRAW','Fair!',true); } else showResult('WIN','Great!',true); } };
                    document.getElementById('xo-grid').appendChild(c);
                }
            } else if(mode === 'math') {
                const a = Math.floor(Math.random()*20), b = Math.floor(Math.random()*20), ans = a+b;
                view.innerHTML = `<h2>${a} + ${b} = ?</h2>`;
                [ans, ans+2, ans-1].sort(()=>Math.random()-0.5).forEach(o => {
                    const btn = document.createElement('button'); btn.className = 'btn'; btn.innerText = o;
                    btn.onclick = () => o === ans ? showResult('CORRECT', '+50 Pts', true) : showResult('WRONG', 'Try Again', false);
                    view.appendChild(btn);
                });
            } else if(mode === 'ball') {
                view.innerHTML = `<div id="area" style="height:200px; position:relative; background:#111; overflow:hidden;"><div id="ghost" style="position:absolute; font-size:30px; cursor:pointer;" onclick="score++; if(score>=5) showResult('WIN','Fast!',true)">👻</div></div>`;
                const g = document.getElementById('ghost');
                const move = () => { if(currentMode==='ball') { g.style.left=Math.random()*80+'%'; g.style.top=Math.random()*80+'%'; setTimeout(move, 600); } };
                move();
            } else if(mode === 'tap') {
                view.innerHTML = `<h3>Tap 20 Times!</h3><button class="btn" style="height:80px; font-size:25px;" onclick="score++; this.innerText=score; if(score>=20) showResult('WIN','Fast!',true)">0</button>`;
            } else if(mode === 'mem') {
                const icons = ['🔥','🔥','💎','💎','⚡','⚡','⭐','⭐'].sort(()=>Math.random()-0.5);
                view.innerHTML = `<div style="display:grid; grid-template-columns:repeat(4,70px); gap:5px; justify-content:center;"></div>`;
                let flipped = [];
                icons.forEach(icon => {
                    const c = document.createElement('div'); c.className = 'cell'; c.innerText = '?';
                    c.onclick = () => { if(flipped.length<2 && c.innerText=='?') { c.innerText = icon; flipped.push({el:c, val:icon}); if(flipped.length===2) { if(flipped[0].val===flipped[1].val) { score++; flipped=[]; if(score===4) showResult('WIN','Great!',true); } else { setTimeout(()=>{ flipped.forEach(f=>f.el.innerText='?'); flipped=[]; }, 400); } } } };
                    view.lastChild.appendChild(c);
                });
            }
        }

        function aiMove() {
            let empty = board.map((v,i)=>v==='' ? i : null).filter(v=>v!==null);
            let m = empty[Math.floor(Math.random()*empty.length)];
            board[m]='O'; let cell = document.getElementById('c'+m);
            cell.innerText='O'; cell.classList.add('p-o');
            if(checkWin(board,'O')) showResult('LOST','AI Wins!',false); else canPlay = true;
        }

        function checkWin(b, p) {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return w.some(s => s.every(i => b[i] === p));
        }

        function showResult(title, desc, isWin) {
            clearInterval(gameTimer);
            document.getElementById('res-title').innerText = title;
            document.getElementById('res-desc').innerText = desc;
            if(isWin) globalPoints += 50;
            localStorage.setItem('brs_pts', globalPoints);
            document.getElementById('total-points').innerText = globalPoints;
            document.getElementById('custom-result-overlay').style.display = 'flex';
        }
        function hideResult() { start(currentMode); }
        function stop() { clearInterval(gameTimer); document.getElementById('gameModal').style.display = 'none'; }
    </script>
</body>
</html>
