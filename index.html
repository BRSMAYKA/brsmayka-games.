<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو ألعاب BRSMAYKA الاحترافي</title>
    <style>
        :root { --primary: #00ffcc; --bg: #0a0a0a; --card: #161616; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 30px; border-bottom: 2px solid var(--primary); margin-bottom: 30px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 1200px; margin: auto; }
        
        /* تصميم البطاقات */
        .game-card {
            background: var(--card); border: 1px solid #333; width: 220px; border-radius: 15px;
            padding: 20px; text-align: center; transition: 0.3s; cursor: pointer; position: relative;
        }
        .game-card:hover { 
            transform: scale(1.05); border-color: var(--primary); 
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }
        .icon { font-size: 50px; margin-bottom: 10px; display: block; }
        .play-btn { 
            background: var(--primary); color: black; border: none; padding: 10px; 
            border-radius: 8px; width: 100%; font-weight: bold; margin-top: 15px; cursor: pointer;
        }

        /* النافذة المنبثقة */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; }
        .modal-content { 
            background: #222; margin: 5% auto; width: 90%; max-width: 500px; 
            padding: 20px; border-radius: 20px; border: 2px solid var(--primary); position: relative;
        }
        .close { position: absolute; left: 20px; top: 10px; font-size: 30px; cursor: pointer; color: white; }
    </style>
</head>
<body>

<div class="header">
    <h1>🎮 استوديو BRSMAYKA المطور</h1>
    <p>ألعاب حصرية مع مؤثرات صوتية</p>
</div>

<div class="container">
    <div class="game-card" onmouseenter="playTick()" onclick="playClick(); openGame('clicker')">
        <span class="icon">⚡</span>
        <h3>تحدي النقر</h3>
        <button class="play-btn">اضغط هنا للعب</button>
    </div>

    <div class="game-card" onmouseenter="playTick()" onclick="playClick(); openGame('penalty')">
        <span class="icon">⚽</span>
        <h3>ضربات جزاء</h3>
        <button class="play-btn">اضغط هنا للعب</button>
    </div>

    <div class="game-card" onmouseenter="playTick()" onclick="playClick(); openGame('xo')">
        <span class="icon">❌</span>
        <h3>لعبة X-O</h3>
        <button class="play-btn">اضغط هنا للعب</button>
    </div>

    <div class="game-card" onmouseenter="playTick()" onclick="playClick(); openGame('wall')">
        <span class="icon">🎾</span>
        <h3>الضرب على الحائط</h3>
        <button class="play-btn">اضغط هنا للعب</button>
    </div>

    <div class="game-card" onmouseenter="playTick()" onclick="playClick(); openGame('chess')">
        <span class="icon">♟️</span>
        <h3>شطرنج خفيف</h3>
        <button class="play-btn">اضغط هنا للعب</button>
    </div>
</div>

<div id="gameModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeGame()">&times;</span>
        <div id="gameArea"></div>
    </div>
</div>

<script>
    // --- نظام الصوت الذكي ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.value = freq;
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }
    function playTick() { playSound(800, 'sine', 0.05); } // صوت عند مرور الماوس
    function playClick() { playSound(400, 'square', 0.1); } // صوت عند الضغط

    // --- نظام الألعاب ---
    function openGame(game) {
        const area = document.getElementById('gameArea');
        document.getElementById('gameModal').style.display = "block";
        if(game === 'xo') {
            area.innerHTML = `<h3>لعبة X-O</h3><div id="xo-board" style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px; max-width:200px; margin:auto;">` + 
            Array(9).fill().map((_,i)=>`<button onclick="playXO(this)" style="height:60px; font-size:24px; background:#444; color:white; border:none;"></button>`).join('') + `</div>`;
        } else if(game === 'wall') {
            area.innerHTML = `<h3>الضرب على الحائط</h3><p>اضغط على الكرة قبل أن تختفي!</p><div id="ball" onclick="hitBall()" style="width:50px; height:50px; background:yellow; border-radius:50%; position:relative; margin:auto; cursor:pointer;"></div>`;
        } else if(game === 'chess') {
            area.innerHTML = `<h3>شطرنج BRSMAYKA</h3><p>نسخة تجريبية: حرك القطع ذهنياً (قريباً التطوير الكامل)</p><div style="font-size:40px;">🏰🐎🐘👸🤴</div>`;
        } else if(game === 'clicker') {
            area.innerHTML = `<h3>تحدي النقر</h3><button onclick="playClick()" style="padding:20px; width:100%;">اضغط!</button>`;
        } else if(game === 'penalty') {
            area.innerHTML = `<h3>ضربات جزاء</h3><div style="display:flex; gap:10px; justify-content:center;"><button onclick="playClick()">يسار</button><button onclick="playClick()">وسط</button><button onclick="playClick()">يمين</button></div>`;
        }
    }

    function closeGame() { document.getElementById('gameModal').style.display = "none"; }

    // وظائف الألعاب الصغيرة
    function playXO(btn) { if(!btn.innerText) { btn.innerText = 'X'; btn.style.background = '#00ffcc'; playClick(); } }
    function hitBall() { 
        const b = document.getElementById('ball');
        b.style.left = Math.random()*150 + 'px';
        b.style.top = Math.random()*50 + 'px';
        playClick();
    }
</script>

<div style="text-align: center; margin-top: 50px; border-top: 1px solid #333; padding: 20px;">
    <p style="color:var(--primary)">إجمالي زوار ستوديو BRSMAYKA:</p>

    <script type="text/javascript" src="https://counter1.optistats.ovh/private/counter.js?c=j1hadcun8xqdfhbzttteef2bq7wl376p&down=async" async></script>
</div>

</body>
</html>
