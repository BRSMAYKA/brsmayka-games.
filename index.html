<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA AI - مستويات X-O 🚀</title>
    <style>
        :root { --primary: #0088ff; --secondary: #ff3333; --bg: #050505; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #111, #050505); }
        
        .header-box { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 25px; }
        .header-box h1 { font-size: 2rem; color: var(--primary); text-shadow: 0 0 15px var(--primary); margin: 0; }
        
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .game-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); width: 140px; border-radius: 20px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--primary); transform: scale(1.05); background: rgba(0, 136, 255, 0.1); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #111; margin: 8vh auto; width: 90%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); position: relative; }
        
        #result-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center; border-radius: 23px; }
        .win-text { color: #00ff88; font-size: 2.2rem; text-shadow: 0 0 20px #00ff88; }
        .lose-text { color: #ff3333; font-size: 2.2rem; text-shadow: 0 0 20px #ff3333; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 80%; margin-top: 10px; font-size: 1rem; }
        .cell { background: #1a1a1a; border-radius: 12px; display: flex; align-items: center; justify-content: center; height: 75px; font-size: 32px; border: 1px solid #333; cursor: pointer; transition: 0.2s; }
        .cell:empty:hover { background: #252525; }

        #arena { height: 230px; background: #000; position: relative; border-radius: 15px; border: 1px solid #333; overflow: hidden; margin-bottom: 10px; }
        #ball { width: 50px; height: 50px; font-size: 40px; position: absolute; cursor: pointer; display: none; z-index: 10; }
        
        .lvl-btn { padding: 8px 15px; border-radius: 10px; border: 1px solid var(--primary); background: none; color: white; cursor: pointer; margin: 5px; font-size: 0.9rem; }
        .lvl-active { background: var(--primary); font-weight: bold; }
    </style>
</head>
<body onclick="initAudio()">
    <div class="bg-layer"></div>
    
    <div class="header-box">
        <h1>🎮 BRSMAYKA AI</h1>
        <div style="background:rgba(255,255,255,0.05); padding:5px 20px; border-radius:50px; border:1px solid var(--primary);">
            <div id="sfcj1hadcun8xqdfhbzttteef2bq7wl376p"></div>
        </div>
    </div>

    <div class="container">
        <div class="game-card" onclick="start('xo')"> ❌ <h3>X-O</h3> </div>
        <div class="game-card" onclick="start('ball')"> 👻 <h3>صيد الشبح</h3> </div>
        <div class="game-card" onclick="start('mem')"> 🧠 <h3>الذاكرة</h3> </div>
        <div class="game-card" onclick="start('tap')"> ⚡ <h3>سرعة الضغط</h3> </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; left:20px; top:10px; font-size:35px; cursor:pointer; color:white; z-index:1001;" onclick="stop()">&times;</span>
            <div id="result-overlay">
                <h1 id="result-msg"></h1>
                <p id="result-details" style="color:#aaa;"></p>
                <button class="btn" onclick="hideResult()">إعادة المحاولة 🔄</button>
            </div>
            <div id="game-view"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://counter1.optistats.ovh/private/counter.js?c=j1hadcun8xqdfhbzttteef2bq7wl376p&down=async" async></script>

    <script>
        let ctx, currentMode, score = 0, difficulty = 'easy';

        function initAudio() { if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); }
        function sfx(f, d = 0.1) { 
            if(ctx) { 
                const o=ctx.createOscillator(), g=ctx.createGain(); 
                o.frequency.value=f; o.connect(g); g.connect(ctx.destination); 
                o.start(); g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + d); 
                o.stop(ctx.currentTime + d); 
            } 
        }

        function showResult(msg, details, isWin) {
            const overlay = document.getElementById('result-overlay');
            const resMsg = document.getElementById('result-msg');
            resMsg.innerText = msg;
            resMsg.className = isWin ? 'win-text' : 'lose-text';
            document.getElementById('result-details').innerText = details;
            overlay.style.display = 'flex';
            isWin ? sfx(800, 0.3) : sfx(150, 0.5);
        }

        function hideResult() {
            document.getElementById('result-overlay').style.display = 'none';
            start(currentMode);
        }

        function stop() { document.getElementById('gameModal').style.display = 'none'; }

        function start(mode) {
            currentMode = mode;
            score = 0;
            document.getElementById('gameModal').style.display = 'block';
            const view = document.getElementById('game-view');
            view.innerHTML = '';

            if(mode === 'xo') {
                view.innerHTML = `
                    <h3>لعبة X-O</h3>
                    <div style="margin-bottom:15px;">
                        <button class="lvl-btn ${difficulty==='easy'?'lvl-active':''}" onclick="difficulty='easy'; start('xo')">سهل</button>
                        <button class="lvl-btn ${difficulty==='medium'?'lvl-active':''}" onclick="difficulty='medium'; start('xo')">متوسط</button>
                        <button class="lvl-btn ${difficulty==='hard'?'lvl-active':''}" onclick="difficulty='hard'; start('xo')">صعب</button>
                    </div>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;" id="xo-grid"></div>
                `;
                let board = Array(9).fill('');
                const grid = document.getElementById('xo-grid');
                
                for(let i=0; i<9; i++) {
                    const c = document.createElement('div');
                    c.className = 'cell';
                    c.onclick = () => {
                        if(board[i] === '' && !checkWin(board)) {
                            board[i] = 'X'; c.innerText = 'X'; sfx(400);
                            if(!checkWin(board)) setTimeout(() => cpuLogic(board, grid), 400);
                        }
                    };
                    grid.appendChild(c);
                }
            }
            // (بقية الألعاب تبقى كما هي من الكود السابق...)
            else if(mode === 'ball') loadBallGame(view);
            else if(mode === 'tap') loadTapGame(view);
            else if(mode === 'mem') loadMemGame(view);
        }

        // منطق الكمبيوتر المتدرج الصعوبة
        function cpuLogic(board, grid) {
            let move;
            const empty = board.map((v,i) => v==='' ? i : null).filter(v => v!==null);
            if(empty.length === 0) return;

            if(difficulty === 'easy') {
                move = empty[Math.floor(Math.random()*empty.length)];
            } 
            else if(difficulty === 'medium') {
                move = findBestMove(board, 'O') || empty[Math.floor(Math.random()*empty.length)];
            }
            else { // الصعب: يحاول الفوز أو منعك من الفوز
                move = findBestMove(board, 'O') || findBestMove(board, 'X') || empty[Math.floor(Math.random()*empty.length)];
            }

            board[move] = 'O';
            grid.children[move].innerText = 'O';
            grid.children[move].style.color = '#ff3333';
            checkWin(board);
        }

        function findBestMove(b, p) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let w of wins) {
                let count = w.filter(i => b[i] === p).length;
                let empty = w.filter(i => b[i] === '');
                if(count === 2 && empty.length === 1) return empty[0];
            }
            return null;
        }

        function checkWin(b) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let w of wins) {
                if(b[w[0]] && b[w[0]]===b[w[1]] && b[w[0]]===b[w[2]]) {
                    showResult(b[w[0]]==='X'?'كفو! فزت 🏆':'للأسف خسرت 💀', difficulty, b[w[0]]==='X'); return true;
                }
            }
            if(!b.includes('')) { showResult('تعادل! 🤝', 'حاول مرة أخرى', true); return true; }
            return false;
        }

        // وظائف الألعاب الأخرى (مختصرة للوضوح)
        function loadBallGame(v) {
            v.innerHTML = `<div id="arena"><div id="ball">👻</div></div><p id="sc">صدت: 0 / 20</p>`;
            const b = document.getElementById('ball'); b.style.display='block';
            b.onclick = () => { score++; document.getElementById('sc').innerText=`صدت: ${score} / 20`; b.style.left=Math.random()*80+'%'; b.style.top=Math.random()*70+'%'; if(score>=20) showResult('بطل!','',true); };
        }
        function loadTapGame(v) {
            v.innerHTML = `<h3>اضغط 25 مرة!</h3><button class="btn" style="height:100px" onclick="score++; this.innerText=score; if(score>=25) showResult('سريع!','',true)">0</button>`;
        }
        function loadMemGame(v) {
            let nums = [1,1,2,2,3,3,4,4].sort(()=>Math.random()-0.5); let f = [];
            v.innerHTML = `<div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;"></div>`;
            nums.forEach(n => {
                const c = document.createElement('div'); c.className='cell'; c.innerText='?';
                c.onclick = () => { if(f.length<2 && c.innerText==='?'){ c.innerText=n; f.push({c,n}); if(f.length===2){ if(f[0].n===f[1].n){ score++; f=[]; if(score===4)showResult('ذكاء خارق!','',true); }else{ setTimeout(()=>{f[0].c.innerText='?'; f[1].c.innerText='?'; f=[];},400); } } } };
                v.querySelector('div').appendChild(c);
            });
        }
    </script>
</body>
</html>
