<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA ULTIMATE - WITH VISITOR COUNTER 🚀</title>
    <style>
        :root { --primary: #0088ff; --accent: #ff3333; --bg: #050505; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; text-align: center; }
        
        /* شريط عداد الزوار العلوي */
        .visitor-counter { background: linear-gradient(45deg, #111, #222); padding: 8px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--primary); display: inline-block; min-width: 150px; font-weight: bold; font-family: monospace; }

        /* شريط المستوى */
        .level-header { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #333; }
        #xp-bar-container { background: #111; height: 10px; border-radius: 5px; margin-top: 8px; overflow: hidden; border: 1px solid #444; }
        #xp-bar-fill { background: linear-gradient(90deg, #0088ff, #00ffcc); width: 0%; height: 100%; transition: 0.4s; }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; max-width: 600px; margin: 0 auto; }
        .game-card { background: #111; border: 1px solid #333; border-radius: 15px; padding: 12px; cursor: pointer; transition: 0.2s; position: relative; }
        .game-card.locked { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
        .game-card:not(.locked):hover { border-color: var(--primary); transform: scale(1.05); }

        /* نافذة اللعبة والعدادات الداخلية */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 1000; backdrop-filter: blur(10px); }
        .modal-content { background: #0c0c0c; margin: 5vh auto; width: 92%; max-width: 400px; padding: 20px; border-radius: 25px; border: 2px solid var(--primary); position: relative; }
        
        .game-stats-inner { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; }
        #timer-box { flex-grow: 1; height: 6px; background: #222; border-radius: 3px; margin: 0 10px; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: var(--accent); }

        #game-canvas { width: 100%; height: 300px; background: #000; border-radius: 15px; border: 1px solid #333; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        #result-screen { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; border-radius: 15px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        
        @keyframes shake { 0%{transform:translate(2px,2px)} 25%{transform:translate(-2px,-2px)} 50%{transform:translate(2px,-2px)} 100%{transform:translate(0,0)} }
        .shake-effect { animation: shake 0.2s; }
        
        .target { position: absolute; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body onload="handleVisitor()">

    <div class="visitor-counter">
        👤 عدد الزيارات: <span id="v-count">0</span>
    </div>

    <div class="level-header">
        <div style="display: flex; justify-content: space-between;">
            <span>المستوى: <b id="main-lvl">1</b></span>
            <span>الخبرة: <b id="main-xp">0</b>/100</span>
        </div>
        <div id="xp-bar-container"><div id="xp-bar-fill"></div></div>
    </div>

    <div class="container" id="menu">
        <div class="game-card" onclick="entry('math', 1)"> ➕ <h3>Math</h3> </div>
        <div class="game-card" onclick="entry('xo', 1)"> ❌ <h3>X-O</h3> </div>
        <div class="game-card" onclick="entry('bird', 1)"> 🐦 <h3>Bird</h3> </div>
        <div class="game-card" onclick="entry('color', 2)"> 🎨 <h3>Color</h3> </div>
        <div class="game-card" onclick="entry('tap', 2)"> ⚡ <h3>Speed</h3> </div>
        <div class="game-card" onclick="entry('num', 2)"> 🔢 <h3>Nums</h3> </div>
        <div class="game-card" onclick="entry('ball', 3)"> 👻 <h3>Ghost</h3> </div>
        <div class="game-card" onclick="entry('type', 3)"> ⌨️ <h3>Type</h3> </div>
        <div class="game-card" onclick="entry('mem', 3)"> 🧠 <h3>Memo</h3> </div>
        <div class="game-card" onclick="entry('war', 4)"> 🔫 <h3>War</h3> </div>
        <div class="game-card" onclick="entry('storm', 4)"> ⛈️ <h3>Storm</h3> </div>
        <div class="game-card" onclick="entry('3d', 5)"> 🌌 <h3>3D</h3> </div>
        <div class="game-card" onclick="entry('slice', 5)"> ⚔️ <h3>Slice</h3> </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content" id="modal-box">
            <span style="position:absolute; left:15px; top:5px; font-size:28px; cursor:pointer;" onclick="closeGame()">&times;</span>
            <div class="game-stats-inner">
                <span>LVL: <span id="inner-lvl">1</span></span>
                <div id="timer-box"><div id="timer-bar"></div></div>
                <span id="inner-score">0</span>
            </div>
            <div id="game-canvas">
                <div id="result-screen">
                    <h2 id="res-title"></h2>
                    <button class="btn" onclick="retry()">إعادة تحميل 🔄</button>
                </div>
                <div id="play-zone" style="width:100%; height:100%;"></div>
            </div>
        </div>
    </div>

    <script>
        // --- وظيفة عداد الزوار ---
        function handleVisitor() {
            let count = localStorage.getItem('visitor_count') || 0;
            count++;
            localStorage.setItem('visitor_count', count);
            document.getElementById('v-count').innerText = count;
            updateMainUI();
        }

        let player = { lvl: 1, xp: 0 };
        let gameTimer, timeLeft, currentMode, isPlaying = false, score = 0;
        let ctx;

        function updateMainUI() {
            document.getElementById('main-lvl').innerText = player.lvl;
            document.getElementById('main-xp').innerText = player.xp;
            document.getElementById('xp-bar-fill').style.width = player.xp + "%";
            const reqs = [1,1,1, 2,2,2, 3,3,3, 4,4, 5,5];
            document.querySelectorAll('.game-card').forEach((c, i) => {
                player.lvl < reqs[i] ? c.classList.add('locked') : c.classList.remove('locked');
            });
        }

        function entry(m, req) {
            if(player.lvl >= req) { currentMode = m; launch(); }
            else { playSfx('fail'); shake(document.body); }
        }

        function launch() {
            isPlaying = true; score = 0; timeLeft = 15;
            document.getElementById('gameModal').style.display = "block";
            document.getElementById('result-screen').style.display = "none";
            document.getElementById('inner-lvl').innerText = player.lvl;
            document.getElementById('inner-score').innerText = "0";
            const zone = document.getElementById('play-zone');
            zone.innerHTML = "";

            if(currentMode === 'math') loadMath(zone);
            else if(currentMode === 'war') loadWar(zone);
            else if(currentMode === 'storm') loadStorm(zone);
            else if(currentMode === 'bird') loadBird(zone);
            else zone.innerHTML = "<h2 style='margin-top:100px'>لعبة " + currentMode + "</h2>";
            
            runTimer();
        }

        function runTimer() {
            clearInterval(gameTimer);
            const bar = document.getElementById('timer-bar');
            gameTimer = setInterval(() => {
                timeLeft -= 0.1;
                bar.style.width = (timeLeft / 15 * 100) + "%";
                if(timeLeft <= 0) finish(false, "انتهى الوقت");
            }, 100);
        }

        function finish(win, msg) {
            isPlaying = false; clearInterval(gameTimer);
            document.getElementById('result-screen').style.display = "flex";
            document.getElementById('res-title').innerText = win ? "فوز! 🏆" : "خسارة 💀";
            if(win) { 
                player.xp += 25; if(player.xp>=100){player.lvl++; player.xp=0;}
                updateMainUI(); playSfx('win');
            } else playSfx('fail');
        }

        function retry() { launch(); }
        function closeGame() { clearInterval(gameTimer); document.getElementById('gameModal').style.display="none"; isPlaying=false; }
        function shake(el) { el.classList.add('shake-effect'); setTimeout(()=>el.classList.remove('shake-effect'),200); }

        // ألعاب سريعة (أمثلة)
        function loadMath(z) {
            let n1 = Math.floor(Math.random()*10), n2 = Math.floor(Math.random()*10);
            z.innerHTML = `<h1 style='margin-top:60px'>${n1} + ${n2} = ?</h1><input type='number' id='ai' style='width:50%; padding:10px;'><button class='btn' onclick="if(document.getElementById('ai').value == ${n1+n2}) finish(true,''); else shake(document.getElementById('modal-box'))">حل</button>`;
        }

        function loadWar(z) {
            function sp() { if(!isPlaying) return;
                let e = document.createElement('div'); e.className="target";
                e.style.cssText = `width:40px;height:40px;background:red;left:${Math.random()*80}%;top:${Math.random()*80}%;`;
                e.onclick = () => { score++; document.getElementById('inner-score').innerText=score; e.remove(); if(score>=10) finish(true,''); else sp(); };
                z.appendChild(e);
            } sp();
        }

        function loadBird(z) {
            z.innerHTML = `<div id='bObj' style='position:absolute; left:20%; top:50%; font-size:30px;'>🐦</div>`;
            let p = 50; z.onclick = () => p -= 10;
            let l = setInterval(() => { p += 1.5; document.getElementById('bObj').style.top = p + "%"; 
            if(p>90 || p<0) { clearInterval(l); finish(false,''); } if(!isPlaying) clearInterval(l); }, 50);
        }

        function initAudio() { if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSfx(t) { if(!ctx) return; let o=ctx.createOscillator(), g=ctx.createGain(); o.connect(g); g.connect(ctx.destination);
            if(t==='fail'){ o.frequency.value=100; g.gain.value=0.1; o.start(); o.stop(ctx.currentTime+0.3); }
            if(t==='win'){ o.frequency.value=600; g.gain.value=0.1; o.start(); o.stop(ctx.currentTime+0.4); }
        }
    </script>
</body>
</html>
