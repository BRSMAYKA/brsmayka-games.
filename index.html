<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو ألعاب BRSMAYKA - النسخة الاحترافية</title>
    <style>
        :root { --primary: #00ffcc; --bg: #0a0a0a; --card: #161616; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .game-card { background: var(--card); border: 2px solid #333; width: 220px; border-radius: 20px; padding: 25px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .play-btn { background: var(--primary); border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding-top: 50px; }
        .modal-content { background: #1a1a1a; margin: auto; width: 90%; max-width: 450px; padding: 30px; border-radius: 25px; border: 2px solid var(--primary); position: relative; }
        .close { position: absolute; left: 20px; top: 15px; font-size: 35px; cursor: pointer; color: #888; }

        #arena { height: 250px; background: #000; position: relative; border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        #target { width: 45px; height: 45px; background: yellow; border-radius: 50%; position: absolute; cursor: pointer; display: none; box-shadow: 0 0 20px yellow; }
        
        .xo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 240px; margin: 20px auto; }
        .cell { width: 75px; height: 75px; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 35px; font-weight: bold; cursor: pointer; border-radius: 12px; }
        .cell.x { color: #ff0055; }
        .cell.o { color: var(--primary); }
        .reset-btn { background: #ff7300; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; display: none; }
    </style>
</head>
<body onclick="initAudio()">

    <h1 style="color: var(--primary);">🎮 مكتبة ألعاب BRSMAYKA</h1>
    <p>ألعاب ذكية خالية من الأخطاء!</p>

    <div class="container">
        <div class="game-card" onclick="openGame('xo')">
            <div style="font-size:50px; margin-bottom:10px;">🎮</div>
            <h3>تحدي X-O</h3>
            <button class="play-btn">ضد الروبوت 🤖</button>
        </div>
        <div class="game-card" onclick="openGame('ball')">
            <div style="font-size:50px; margin-bottom:10px;">🎾</div>
            <h3>سرعة الصيد</h3>
            <button class="play-btn">اصطد الكرة</button>
        </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGame()">&times;</span>
            <div id="gameArea"></div>
            <button id="resetBtn" class="reset-btn">إعادة المحاولة 🔄</button>
        </div>
    </div>

<script>
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playClick() { if(audioCtx) { const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1); } }

    let pts = 0, ballTimer, board = ["", "", "", "", "", "", "", "", ""], gameActive = true;

    function openGame(game) {
        document.getElementById('gameModal').style.display = "block";
        if(game === 'xo') resetXO();
        else if(game === 'ball') startBallGame();
    }

    // --- لعبة X-O المصححة ---
    function resetXO() {
        board = ["", "", "", "", "", "", "", "", ""]; gameActive = true;
        document.getElementById('resetBtn').style.display = "none";
        renderXO();
    }

    function renderXO() {
        document.getElementById('gameArea').innerHTML = `
            <h3>أنت (X) ضد الروبوت (O)</h3>
            <div class="xo-grid">${board.map((v, i) => `<div class="cell ${v.toLowerCase()}" onclick="playerMove(${i})">${v}</div>`).join('')}</div>
            <p id="status" style="font-weight:bold; font-size:20px;"></p>
        `;
    }

    function playerMove(i) {
        if(board[i] === "" && gameActive) {
            board[i] = "X"; playClick();
            if(!checkWinner()) setTimeout(robotMove, 400);
            renderXO();
        }
    }

    function robotMove() {
        if(!gameActive) return;
        let empty = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
        if(empty.length > 0) {
            board[empty[Math.floor(Math.random() * empty.length)]] = "O";
            checkWinner(); renderXO();
        }
    }

    function checkWinner() {
        const winPatterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for(let p of winPatterns) {
            const [a, b, c] = p;
            if(board[a] && board[a] === board[b] && board[a] === board[c]) {
                gameActive = false;
                // هنا التعديل: فحص من هو الفائز الفعلي
                let winnerText = (board[a] === "X") ? "مبروك فزت! 🔥" : "الروبوت فاز! 🤖";
                setTimeout(() => {
                    document.getElementById('status').innerText = winnerText;
                    document.getElementById('resetBtn').style.display = "inline-block";
                    document.getElementById('resetBtn').onclick = resetXO;
                }, 200);
                return true;
            }
        }
        if(!board.includes("")) {
            gameActive = false;
            document.getElementById('status').innerText = "تعادل! 🤝";
            document.getElementById('resetBtn').style.display = "inline-block";
            return true;
        }
        return false;
    }

    // --- لعبة الكرة ---
    function startBallGame() {
        pts = 0; document.getElementById('resetBtn').style.display = "none";
        document.getElementById('gameArea').innerHTML = `<h3>اصطاد الكرة!</h3><div id="arena"><div id="target" onclick="hitBall()"></div></div><h2 id="score">النقاط: 0</h2>`;
        moveBall();
    }
    function moveBall() {
        clearTimeout(ballTimer); const t = document.getElementById('target');
        if(!t) return;
        t.style.display = "block"; t.style.top = Math.random() * 190 + "px"; t.style.left = Math.random() * 370 + "px";
        ballTimer = setTimeout(moveBall, 1200);
    }
    function hitBall() { pts++; playClick(); document.getElementById('score').innerText = "النقاط: " + pts; moveBall(); }

    function closeGame() { clearTimeout(ballTimer); document.getElementById('gameModal').style.display = "none"; }
</script>
