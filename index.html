<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو ألعاب BRSMAYKA - النسخة الملونة</title>
    <style>
        :root { 
            --primary: #0088ff; /* أزرق */
            --secondary: #ff3333; /* أحمر */
            --bg: #050505; 
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            text-align: center;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary);
        }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 40px; }

        .game-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 200px;
            border-radius: 20px;
            padding: 25px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 136, 255, 0.3);
        }

        /* ألوان X و O الجديدة */
        .cell.x { color: var(--secondary); text-shadow: 0 0 10px var(--secondary); }
        .cell.o { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 1000; }
        .modal-content { 
            background: #111; margin: 5vh auto; width: 90%; max-width: 450px; padding: 30px; 
            border-radius: 30px; border: 2px solid var(--primary); position: relative;
        }

        #arena { background: #000; border-radius: 20px; height: 250px; position: relative; overflow: hidden; border: 1px solid #333; }
        
        /* الكرة المختفية (تظهر فقط عند الانتقال وتختفي بسرعة) */
        #target { 
            width: 40px; height: 40px; background: yellow; border-radius: 50%; 
            position: absolute; cursor: pointer; display: none; 
            box-shadow: 0 0 20px yellow; opacity: 0; transition: opacity 0.1s;
        }

        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body onclick="initAudio()">

    <div class="header">
        <h1>🎮 BRSMAYKA PRO STUDIO</h1>
        <p>الألوان الجديدة: <span style="color:var(--secondary)">الأحمر</span> و <span style="color:var(--primary)">الأزرق</span></p>
    </div>

    <div class="container">
        <div class="game-card" onclick="openGame('xo')">
            <span style="font-size:50px">❌</span>
            <h3>تحدي X-O</h3>
            <button class="btn">العب</button>
        </div>
        <div class="game-card" onclick="openGame('ball')">
            <span style="font-size:50px">👻</span>
            <h3>الكرة الشبح</h3>
            <button class="btn">اصطدها!</button>
        </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content" id="modalBox">
            <span style="position:absolute; left:20px; top:15px; cursor:pointer; font-size:30px; color:white;" onclick="closeGame()">&times;</span>
            <div id="game-area"></div>
            <button id="resetBtn" class="btn" style="margin-top:20px; background:#ff7300; display:none;">إعادة المحاولة 🔄</button>
        </div>
    </div>

<script>
    let audioCtx;
    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSfx(f) { 
        if(!audioCtx) return;
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.frequency.value = f; o.connect(g); g.connect(audioCtx.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1); o.stop(audioCtx.currentTime + 0.1);
    }

    function openGame(g) {
        document.getElementById('gameModal').style.display = "block";
        if(g === 'xo') loadXO();
        if(g === 'ball') loadBall();
    }

    function loadXO() {
        let b = ["","","","","","","","",""], active = true;
        const area = document.getElementById('game-area');
        const render = () => {
            area.innerHTML = `<h3>X-O (أزرق وأحمر)</h3><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:240px; margin:auto;">${b.map((v,i)=>`<div class="cell ${v.toLowerCase()}" style="height:75px; background:#222; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:35px; font-weight:bold; cursor:pointer;" onclick="move(${i})">${v}</div>`).join('')}</div><h2 id="status"></h2>`;
        };
        window.move = (i) => {
            if(b[i]==="" && active) {
                b[i]="X"; playSfx(600);
                if(!check(b)) setTimeout(robot, 400);
                render();
            }
        };
        const robot = () => {
            let e = b.map((v,i)=> v===""?i:null).filter(v=>v!==null);
            if(e.length > 0 && active) { b[e[Math.floor(Math.random()*e.length)]]="O"; playSfx(400); check(b); render(); }
        };
        const check = (board) => {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let p of w) {
                if(board[p[0]] && board[p[0]]===board[p[1]] && board[p[0]]===board[p[2]]) {
                    active = false;
                    let isWin = board[p[0]]==="X";
                    document.getElementById('status').innerText = isWin ? "فزت بالأحمر! 🔥" : "خسر الأزرق! 🤖";
                    if(!isWin) document.getElementById('modalBox').classList.add('shake');
                    document.getElementById('resetBtn').style.display = "inline-block";
                    document.getElementById('resetBtn').onclick = loadXO;
                    return true;
                }
            }
            if(!board.includes("")) { document.getElementById('status').innerText = "تعادل! 🤝"; document.getElementById('resetBtn').style.display = "inline-block"; return true;}
            return false;
        };
        render();
    }

    let ballTimer;
    function loadBall() {
        let pts = 0;
        document.getElementById('game-area').innerHTML = `<h3>صيد الكرة الشبح</h3><p>الكرة مختفية.. انتظر ظهورها الخاطف!</p><div id="arena"><div id="target" onclick="hit()"></div></div><h2>النقاط: <span id="pts">0</span></h2>`;
        const t = document.getElementById('target');
        window.hit = () => { pts++; document.getElementById('pts').innerText = pts; playSfx(800); move(); };
        const move = () => { 
            clearTimeout(ballTimer);
            t.style.display = "block";
            t.style.opacity = "1"; // تظهر
            t.style.top = Math.random()*190+"px"; t.style.left = Math.random()*360+"px";
            
            // تختفي بعد نصف ثانية فقط!
            setTimeout(() => { t.style.opacity = "0"; }, 500); 
            ballTimer = setTimeout(move, 1500); 
        };
        move();
    }

    function closeGame() { 
        clearTimeout(ballTimer);
        document.getElementById('gameModal').style.display = "none"; 
        document.getElementById('modalBox').classList.remove('shake');
    }
</script>
