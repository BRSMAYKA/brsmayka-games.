<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA GAMING</title>
    <style>
        :root { --primary: #00ffcc; --secondary: #ff3366; --bg: #0a0a0a; --accent-green: #00ff44; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        
        .brand-name { color: var(--accent-green); text-shadow: 0 0 15px var(--accent-green); font-size: 2.5rem; margin: 10px 0; font-weight: 900; }

        /* Share Section */
        .share-box { background: #111; border: 1px solid #222; border-radius: 15px; padding: 15px; max-width: 450px; margin: 20px auto; }
        .share-buttons { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .s-btn { padding: 10px 15px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 13px; }
        .wa { background: #25D366; } .fb { background: #1877F2; } .tw { background: #000; border: 1px solid #444; }

        /* Visitor Counter (The one in your image) */
        .visitor-counter-wrapper { margin: 30px auto; padding: 10px; border: 1px dashed #444; display: inline-block; border-radius: 10px; }

        /* Timer UI */
        #timer-container { display: flex; align-items: center; gap: 10px; margin: 15px 0; }
        #timer-bar-container { flex-grow: 1; height: 10px; background: #222; border-radius: 10px; overflow: hidden; }
        #timer-bar { height: 100%; width: 100%; background: var(--accent-green); transition: 0.1s linear; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 20px; }
        .game-card { background: #111; border: 1px solid #222; width: 130px; border-radius: 15px; padding: 20px 10px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--accent-green); transform: translateY(-5px); }
        .game-card i { font-size: 24px; display: block; margin-bottom: 10px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #0f0f0f; margin: 5vh auto; width: 92%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); position: relative; }
        #custom-result-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; border-radius: 23px; }
        
        .btn { background: var(--accent-green); color: #000; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 85%; margin: 5px; }
        .cell { background: #161616; border-radius: 12px; display: flex; align-items: center; justify-content: center; height: 75px; width: 75px; font-size: 32px; border: 1px solid #333; color: var(--accent-green); }
        .lvl-btn { padding: 5px 10px; font-size: 11px; cursor: pointer; border: 1px solid var(--primary); background: transparent; color: white; border-radius: 5px; margin: 2px; }
        .lvl-btn.active { background: var(--accent-green); color: black; }

        footer { margin-top: 50px; padding: 20px; border-top: 1px solid #222; font-size: 14px; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .shake-fx { animation: shake 0.3s; }
    </style>
</head>
<body onload="initApp()">

    <h1 class="brand-name">BRSMAYKA GAMING</h1>

    <div class="share-box">
        <span style="font-size: 12px; color: #888; font-weight: bold;">SHARE SITE</span>
        <div class="share-buttons">
            <a href="#" class="s-btn wa">WhatsApp</a>
            <a href="#" class="s-btn fb">Facebook</a>
            <a href="#" class="s-btn tw">X (Twitter)</a>
        </div>
    </div>

    <div class="visitor-counter-wrapper">
        <img src="https://count.getloli.com/get/@brsmayka_gaming?theme=rule734" alt="Visitor Counter">
    </div>

    <div id="persistent-score" style="margin: 10px;">Points: <span id="total-points" style="color:var(--accent-green)">0</span></div>

    <div class="container">
        <div class="game-card" onclick="start('xo')">🤖<br><b>XO AI</b></div>
        <div class="game-card" onclick="start('math')">÷<br><b>Math</b></div>
        <div class="game-card" onclick="start('mem')">🧠<br><b>Memory</b></div>
        <div class="game-card" onclick="start('ball')">👻<br><b>Ghost</b></div>
        <div class="game-card" onclick="start('tap')">⚡<br><b>Tap</b></div>
    </div>

    <footer>
        <a onclick="alert('Privacy Policy: بياناتك محفوظة محلياً.')" style="color:var(--accent-green); cursor:pointer;">Privacy Policy</a> | 
        <span style="color:#666">Morocco</span>
        <p>© 2026 BrsMayka Gaming</p>
    </footer>

    <div id="gameModal" class="modal">
        <div id="game-box" class="modal-content">
            <span style="position:absolute; right:20px; top:10px; font-size:30px; cursor:pointer;" onclick="stop()">&times;</span>
            <div id="timer-container">
                <div id="timer-bar-container"><div id="timer-bar"></div></div>
                <span id="timer-text" style="font-family:monospace; margin-left:5px;">0s</span>
            </div>
            <div id="game-view"></div>
            <div id="custom-result-overlay">
                <h1 id="res-title"></h1>
                <p id="res-desc"></p>
                <button class="btn" onclick="hideResult()">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        let currentMode, score = 0, globalPoints = 0, gameTimer, timeLeft, board = [], canPlay = true, difficulty = 'hard';

        function initApp() {
            globalPoints = parseInt(localStorage.getItem('brs_pts')) || 0;
            document.getElementById('total-points').innerText = globalPoints;
        }

        function showResult(title, desc, isWin) {
            clearInterval(gameTimer);
            const overlay = document.getElementById('custom-result-overlay');
            document.getElementById('res-title').innerText = title;
            document.getElementById('res-desc').innerText = desc;
            if(isWin) {
                document.getElementById('res-title').style.color = "var(--accent-green)";
                globalPoints += 50;
            } else {
                document.getElementById('res-title').style.color = "var(--secondary)";
                document.getElementById('game-box').classList.add('shake-fx');
                if (navigator.vibrate) navigator.vibrate(200);
            }
            localStorage.setItem('brs_pts', globalPoints);
            document.getElementById('total-points').innerText = globalPoints;
            overlay.style.display = 'flex';
        }

        function hideResult() {
            document.getElementById('game-box').classList.remove('shake-fx');
            document.getElementById('custom-result-overlay').style.display = 'none';
            start(currentMode);
        }

        function stop() { clearInterval(gameTimer); document.getElementById('gameModal').style.display = 'none'; }

        function start(mode) {
            currentMode = mode; score = 0; canPlay = true; board = Array(9).fill('');
            document.getElementById('gameModal').style.display = 'block';
            document.getElementById('custom-result-overlay').style.display = 'none';
            const view = document.getElementById('game-view'); view.innerHTML = '';
            
            let total = (mode === 'math' ? 8 : 15);
            timeLeft = total;
            clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timer-bar').style.width = (timeLeft/total)*100 + '%';
                document.getElementById('timer-text').innerText = Math.max(0, timeLeft).toFixed(1) + 's';
                if(timeLeft <= 0) showResult('LOSE', 'Time is up!', false);
            }, 100);

            if(mode === 'math') {
                let a = Math.floor(Math.random()*20), b = Math.floor(Math.random()*20);
                view.innerHTML = `<h2>${a} + ${b} = ?</h2>`;
                [a+b, a+b+2, a+b-3].sort(()=>Math.random()-0.5).forEach(n => {
                    let bttn = document.createElement('button'); bttn.className = 'btn'; bttn.innerText = n;
                    bttn.onclick = () => n === a+b ? showResult('WIN', 'Correct!', true) : showResult('LOSE', 'Wrong!', false);
                    view.appendChild(bttn);
                });
            } else if(mode === 'tap') {
                view.innerHTML = `<button class="btn" style="height:100px; font-size:30px;" onclick="score++; this.innerText=score; if(score>=20) showResult('WIN','Fast!',true)">0</button>`;
            } else if(mode === 'ball') {
                view.innerHTML = `<div style="height:200px; position:relative; background:#111; border-radius:10px; overflow:hidden;">
                    <div id="ghost" style="position:absolute; font-size:40px; cursor:pointer;" onclick="score++; this.style.left=Math.random()*80+'%'; this.style.top=Math.random()*80+'%'; if(score>=10) showResult('WIN','Hunter!',true)">👻</div>
                </div>`;
            } else if(mode === 'xo') {
                view.innerHTML = `<div style="margin-bottom:10px;"><button class="lvl-btn" onclick="difficulty='easy'">Easy</button><button class="lvl-btn active" onclick="difficulty='hard'">Hard</button></div>
                <div style="display:grid; grid-template-columns:repeat(3,75px); gap:5px; justify-content:center;"></div>`;
                for(let i=0; i<9; i++) {
                    let c = document.createElement('div'); c.className = 'cell'; c.id = 'c'+i;
                    c.onclick = () => { if(canPlay && board[i]==='') { board[i]='X'; c.innerText='X'; if(!checkWin('X')) { canPlay=false; setTimeout(ai, 500); } else showResult('WIN','Bravo!',true); } };
                    view.lastChild.appendChild(c);
                }
            }
        }

        function ai() {
            let empty = board.map((v,i)=>v==='' ? i : null).filter(v=>v!==null);
            if(empty.length > 0) {
                let m = empty[Math.floor(Math.random()*empty.length)];
                board[m]='O'; document.getElementById('c'+m).innerText='O';
                if(checkWin('O')) showResult('LOSE', 'AI Won!', false);
                else canPlay = true;
            } else showResult('DRAW', 'Fair!', true);
        }

        function checkWin(p) {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return w.some(s => s.every(i => board[i]===p));
        }
    </script>
</body>
</html>
