<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA STUDIO - الإصدار المستقر</title>
    <style>
        :root { 
            --primary: #0088ff; 
            --secondary: #ff3333; 
            --bg: #050505; 
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            text-align: center;
        }

        /* تنسيق الهيدر مع العداد */
        .header-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .header-main h1 {
            font-size: 2rem;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
            margin: 0;
        }

        .counter-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid var(--primary);
            min-width: 100px;
            display: inline-block;
        }

        /* كروت الألعاب */
        .container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
        }

        .game-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 180px;
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 136, 255, 0.2);
        }

        /* نافذة اللعب */
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.9); 
            z-index: 1000; 
            backdrop-filter: blur(5px);
        }

        .modal-content { 
            background: #111; 
            margin: 10vh auto; 
            width: 90%; 
            max-width: 400px; 
            padding: 25px; 
            border-radius: 25px; 
            border: 2px solid var(--primary); 
            position: relative;
        }

        /* ألوان X و O */
        .cell { background: #222; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; height: 70px; }
        .cell.x { color: var(--secondary); text-shadow: 0 0 8px var(--secondary); }
        .cell.o { color: var(--primary); text-shadow: 0 0 8px var(--primary); }

        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        
        #target { 
            width: 40px; height: 40px; background: yellow; border-radius: 50%; 
            position: absolute; cursor: pointer; display: none; 
            box-shadow: 0 0 20px yellow; opacity: 0;
        }
    </style>
</head>
<body onclick="initAudio()">

    <div class="header-main">
        <h1>🎮 BRSMAYKA PRO</h1>
        <div class="counter-box">
            <div id="sfcj1hadcun8xqdfhbzttteef2bq7wl376p"></div>
        </div>
    </div>

    <div class="container">
        <div class="game-card" onclick="openGame('xo')">
            <div style="font-size: 40px;">❌</div>
            <h3>تحدي X-O</h3>
            <button class="btn">العب</button>
        </div>

        <div class="game-card" onclick="openGame('ball')">
            <div style="font-size: 40px;">👻</div>
            <h3>الكرة الشبح</h3>
            <button class="btn">العب</button>
        </div>
    </div>
