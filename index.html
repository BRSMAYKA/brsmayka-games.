<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA - Classic Edition 🚀</title>
    <style>
        :root { --primary: #0088ff; --accent: #ff3333; --bg: #050505; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; text-align: center; }

        /* عداد الزوار */
        .visitor-counter { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid var(--primary); display: inline-block; margin-bottom: 20px; font-weight: bold; }

        /* شريط المستوى الرئيسي */
        .level-header { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #333; max-width: 450px; margin-left: auto; margin-right: auto; }
        #xp-bar-container { background: #111; height: 10px; border-radius: 5px; margin-top: 10px; overflow: hidden; border: 1px solid #444; }
        #xp-bar-fill { background: linear-gradient(90deg, #0088ff, #00ffcc); width: 0%; height: 100%; transition: 0.4s; }

        /* قائمة الألعاب */
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; max-width: 600px; margin: 0 auto; }
        .game-card { background: #111; border: 1px solid #333; border-radius: 20px; padding: 15px; cursor: pointer; transition: 0.3s; position: relative; }
        .game-card.locked { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
        .game-card:not(.locked):hover { border-color: var(--primary); transform: translateY(-5px); background: #161616; }
        .lvl-tag { position: absolute; top: 8px; right: 8px; background: var(--primary); font-size: 10px; padding: 2px 6px; border-radius: 8px; font-weight: bold; }

        /* نافذة اللعبة */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; backdrop-filter: blur(15px); }
        .modal-content { background: #0c0c0c; margin: 8vh auto; width: 90%; max-width: 400px; padding: 25px; border-radius: 30px; border: 2px solid var(--primary); position: relative; }
        
        .inner-stats { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; font-family: monospace; }
        #t-box { flex-grow: 1; height: 8px; background: #222; border-radius: 4px; margin: 0 15px; overflow: hidden; }
        #t-bar { width: 100%; height: 100%; background: var(--accent); transition: 0.1s linear; }

        #canvas { width: 100%; height: 300px; background: #000; border-radius: 20px; border: 1px solid #333; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* شاشة النتيجة واهتزاز الخطأ */
        #res-screen { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; }
        
        @keyframes shake { 0%{transform:translate(3px,0)} 25%{transform:translate(-3px,0)} 50%{transform:translate(3px,0)} 100%{transform:translate(0,0)} }
        .shake { animation: shake 0.2s; border-color: #ff3333 !important; }
    </style>
</head>
<body onload="initApp()">

    <div class="visitor-counter">👤 زوار الصفحة: <span id="v-count">0</span></div>

    <div class="level-header">
        <div style="display: flex; justify-content: space-between;">
            <span>المستوى: <b id="m-lvl">1</b></span>
            <span>XP: <b id="m-xp">0</b>/100</span>
        </div>
        <div id="xp-bar-container"><div id="xp-bar-fill"></div></div>
    </div>

    <div class="container" id="menu">
        <div class="game-card" onclick="entry('math', 1)"> <span class="lvl-tag">L1</span> ➕ <h3>Math</h3> </div>
        <div class="game-card" onclick="entry('xo', 1)"> <span class="lvl-tag">L1</span> ❌ <h3>X-O</h3> </div>
        <div class="game-card" onclick="entry('tap', 2)"> <span class="lvl-tag">L2</span> ⚡ <h3>Speed</h3> </div>
        <div class="game-card" onclick="entry('war', 3)"> <span class="lvl-tag">L3</span> 🔫 <h3>War</h3> </div>
        <div class="game-card" onclick="entry('3d', 4)"> <span class="lvl-tag">L4</span> 🌌 <h3>3D</h3> </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content" id="modal-box">
            <span style="position:absolute; left:20px; top:10px; font-size:30px; cursor:pointer;" onclick="closeGame()">&times;</span>
            <div class="inner-stats">
                <span>LVL: <span id="i-lvl">1</span></span>
                <div id="t-box"><div id="t-bar"></div></div>
                <span id="i-score">0</span>
            </div>
            <div id="canvas">
                <div id="res-screen">
                    <h2 id="res-h"></h2>
                    <button class="btn" onclick="startNew()">إعادة المحاولة 🔄</button>
                </div>
                <div id="play-area" style="width:100%; height:100%;"></div>
            </div>
        </div>
    </div>

    <script>
        let player = { lvl: 1, xp: 0 };
        let timer, timeLeft, currentMode, active = false, score = 0, ctx;

        function initApp() {
            let count = localStorage.getItem('v_count') || 0;
            count++;
            localStorage.setItem('v_count', count);
            document.getElementById('v-count').innerText = count;
            updateUI();
        }

        function updateUI() {
            document.getElementById('m-lvl').innerText = player.lvl;
            document.getElementById('m-xp').innerText = player.xp;
            document.getElementById('xp-bar-fill').style.width = player.xp + "%";
            const reqs = [1, 1, 2, 3, 4];
            document.querySelectorAll('.game-card').forEach((c, i) => {
                player.lvl < reqs[i] ? c.classList.add('locked') : c.classList.remove('locked');
            });
        }

        function entry(m, req) {
            if(player.lvl >= req) { currentMode = m; startNew(); }
            else { playSfx('fail'); doShake(document.body); }
        }

        function startNew() {
            active = true; score = 0; timeLeft = 15;
            document.getElementById('gameModal').style.display = "block";
            document.getElementById('res-screen').style.display = "none";
            document.getElementById('i-lvl').innerText = player.lvl;
            document.getElementById('i-score').innerText = "0";
            const area = document.getElementById('play-area');
            area.innerHTML = "";

            if(currentMode === 'math') loadMath(area);
            else if(currentMode === 'war') loadWar(area);
            else if(currentMode === '3d') load3D(area);
            else if(currentMode === 'xo') loadXO(area);
            else if(currentMode === 'tap') loadTap(area);

            runTimer();
        }

        function runTimer() {
            clearInterval(timer);
            const bar = document.getElementById('t-bar');
            timer = setInterval(() => {
                timeLeft -= 0.1;
                bar.style.width = (timeLeft / 15 * 100) + "%";
                if(timeLeft <= 0) finish(false);
            }, 100);
        }

        function finish(win) {
            active = false; clearInterval(timer);
            document.getElementById('res-screen').style.display = "flex";
            document.getElementById('res-h').innerText = win ? "أحسنت! 🏆" : "خسارة! 💀";
            if(win) { 
                player.xp += 30; if(player.xp>=100){player.lvl++; player.xp=0;}
                updateUI(); playSfx('win');
            } else playSfx('fail');
        }

        function doShake(el) {
            const target = el === document.body ? document.getElementById('menu') : document.getElementById('modal-box');
            target.classList.add('shake');
            setTimeout(() => target.classList.remove('shake'), 200);
        }

        function closeGame() { clearInterval(timer); document.getElementById('gameModal').style.display="none"; active=false; }

        // --- الألعاب ---
        function loadMath(z) {
            let n1 = Math.floor(Math.random()*15), n2 = Math.floor(Math.random()*15), res = n1+n2;
            z.innerHTML = `<h1 style='margin-top:60px'>${n1} + ${n2} = ?</h1><input type='number' id='ans' style='width:50%; font-size:24px; text-align:center; padding:10px; border-radius:10px; margin-bottom:10px;'><button class='btn' onclick="if(document.getElementById('ans').value == ${res}) finish(true); else {playSfx('fail'); doShake();}">تحقق</button>`;
        }

        function loadWar(z) {
            function sp() { if(!active) return;
                let e = document.createElement('div'); e.style.cssText = `position:absolute; width:45px; height:45px; background:red; border-radius:10px; left:${Math.random()*85}%; top:${Math.random()*80}%; cursor:pointer;`;
                e.onclick = () => { score++; document.getElementById('i-score').innerText=score; e.remove(); if(score>=10) finish(true); else sp(); };
                z.appendChild(e);
            } sp(); sp();
        }

        function load3D(z) {
            function sp() { if(!active) return;
                let s = document.createElement('div'); s.style.cssText = `position:absolute; width:30px; height:30px; background:#00ffcc; border-radius:50%; left:${Math.random()*85}%; top:${Math.random()*80}%; box-shadow:0 0 15px #0ff;`;
                z.appendChild(s);
                let a = s.animate([{transform:'scale(0)',opacity:0},{transform:'scale(3)',opacity:1}], 1500);
                s.onclick = () => { score++; document.getElementById('i-score').innerText=score; s.remove(); if(score>=10) finish(true); };
                a.onfinish = () => { if(s.parentNode){ s.remove(); sp(); } };
            } sp();
        }

        function loadXO(z) {
            let b = ["","","","","","","","",""];
            const d = () => { z.innerHTML = `<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:220px; margin-top:40px;">${b.map((s,i)=>`<div style='background:#1a1a1a; height:60px; display:flex; align-items:center; justify-content:center; font-size:28px; border-radius:10px;' onclick="xoM(${i})">${s}</div>`).join('')}</div>`; };
            window.xoM = (i) => { if(b[i]==="" && active) { b[i]="X"; let e=b.map((s,x)=>s===""?x:null).filter(x=>x!==null); if(e.length>0) b[e[Math.floor(Math.random()*e.length)]]="O"; d(); } };
            d();
        }

        function loadTap(z) { z.innerHTML="<h2 style='margin-top:100px'>اضغط 20 مرة!</h2>"; z.onclick=()=>{score++; document.getElementById('i-score').innerText=score; if(score>=20) finish(true);}; }

        function playSfx(t) {
            if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
            let o=ctx.createOscillator(), g=ctx.createGain(); o.connect(g); g.connect(ctx.destination);
            o.frequency.value = t==='win' ? 600 : 150; g.gain.value=0.1; o.start(); o.stop(ctx.currentTime+0.2);
        }
    </script>
</body>
</html>
