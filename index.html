<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA GAMES 🚀</title>
    <style>
        :root { --primary: #0088ff; --accent: #ff3333; --bg: #050505; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #111, #050505); }
        
        #stats-bar { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); border: 1px solid #333; padding: 5px 12px; border-radius: 8px; font-family: monospace; z-index: 10000; font-size: 12px; pointer-events: none; text-align: left; }

        .header-box { margin-bottom: 35px; }
        .rocket-row { display: flex; align-items: center; justify-content: center; gap: 15px; }
        h1 { font-size: 2.2rem; color: var(--primary); text-shadow: 0 0 15px var(--primary); margin: 0; font-weight: 900; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .game-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); width: 140px; border-radius: 20px; padding: 20px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--primary); transform: translateY(-5px); background: rgba(0, 136, 255, 0.1); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #111; margin: 5vh auto; width: 90%; max-width: 450px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); position: relative; min-height: 300px; }
        
        #result-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center; border-radius: 23px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; font-size: 1.1rem; }
        .cell { background: #222; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; height: 60px; font-size: 25px; }
        input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid var(--primary); background: #222; color: white; text-align: center; font-size: 22px; margin-bottom: 10px; outline: none; }
        
        #arena { position: relative; background: #000; height: 250px; width: 100%; border: 2px solid #333; overflow: hidden; border-radius: 15px; cursor: crosshair; }
        .enemy { position: absolute; width: 50px; height: 50px; background: url('https://cdn-icons-png.flaticon.com/512/711/711768.png') no-repeat center; background-size: contain; filter: drop-shadow(0 0 5px red); }
        #ball { width: 40px; height: 40px; background: yellow; border-radius: 50%; position: absolute; cursor: pointer; display: none; box-shadow: 0 0 20px yellow; border: 2px solid white; }
    </style>
</head>
<body onclick="initAudio()">

    <div id="stats-bar">
        <div id="fps-val" style="color: #00ff00;">FPS: --</div>
        <div style="color: #00ccff;">120Hz MODE</div>
    </div>

    <div class="header-box">
        <div class="rocket-row">
            <span>🚀</span><h1>BRSMAYKA GAMES</h1><span>🚀</span>
        </div>
    </div>

    <div class="container">
        <div class="game-card" onclick="start('war')"> 🔫 <h3>War Mode</h3> </div>
        <div class="game-card" onclick="start('math')"> ➕ <h3>Math</h3> </div>
        <div class="game-card" onclick="start('ball')"> 👻 <h3>Ghost</h3> </div>
        <div class="game-card" onclick="start('xo')"> ❌ <h3>X-O</h3> </div>
        <div class="game-card" onclick="start('mem')"> 🧠 <h3>Memory</h3> </div>
        <div class="game-card" onclick="start('tap')"> ⚡ <h3>Speed</h3> </div>
        <div class="game-card" onclick="start('num')"> 🔢 <h3>Numbers</h3> </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; left:20px; top:10px; font-size:30px; cursor:pointer; color:white; z-index:101;" onclick="stop()">&times;</span>
            <div id="result-overlay">
                <h1 id="res-msg"></h1>
                <p id="res-details" style="color:#aaa;"></p>
                <button class="btn" onclick="hideResult()">إعادة المحاولة 🔄</button>
            </div>
            <div id="game-view"></div>
        </div>
    </div>

    <script>
        // --- FPS Engine ---
        let lastTime = performance.now(), frames = 0;
        function updateFPS() {
            let now = performance.now(); frames++;
            if (now >= lastTime + 1000) {
                document.getElementById('fps-val').innerText = "FPS: " + frames;
                frames = 0; lastTime = now;
            }
            requestAnimationFrame(updateFPS);
        }
        updateFPS();

        let ctx, timerInt, currentGame = '';
        function initAudio() { if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); }
        function sfx(f, d = 0.1) { if(ctx) { const o=ctx.createOscillator(), g=ctx.createGain(); o.frequency.value=f; o.connect(g); g.connect(ctx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + d); o.stop(ctx.currentTime + d); } }

        function start(m) {
            currentGame = m; clearInterval(timerInt);
            document.getElementById('gameModal').style.display="block";
            const v = document.getElementById('game-view');
            v.innerHTML = '';
            if(m==='war') loadWar(v);
            else if(m==='math') loadMath(v);
            else if(m==='ball') loadBall(v);
            else if(m==='xo') loadXO(v);
            else if(m==='mem') loadMem(v);
            else if(m==='tap') loadTap(v);
            else if(m==='num') loadNum(v);
        }

        function stop() { clearInterval(timerInt); document.getElementById('gameModal').style.display="none"; }
        function hideResult() { document.getElementById('result-overlay').style.display = 'none'; start(currentGame); }
        function showResult(m, d, w) {
            const o = document.getElementById('result-overlay');
            document.getElementById('res-msg').innerText = m;
            document.getElementById('res-msg').style.color = w ? '#00ff88' : '#ff3333';
            document.getElementById('res-details').innerText = d;
            o.style.display = 'flex';
        }

        // --- 1. War Mode ---
        function loadWar(v) {
            let kills = 0, time = 15;
            v.innerHTML = `<h3>War Zone 🔫</h3><div id="arena"></div><p>Targets: <span id="k">0</span> | Time: <span id="t">15</span></p>`;
            const a = document.getElementById('arena');
            function spawn() {
                if(currentGame !== 'war' || time <= 0) return;
                const e = document.createElement('div'); e.className = 'enemy';
                e.style.left = Math.random() * (a.clientWidth - 50) + "px";
                e.style.top = Math.random() * (a.clientHeight - 50) + "px";
                e.onclick = () => { kills++; document.getElementById('k').innerText = kills; sfx(150); e.remove(); spawn(); };
                a.appendChild(e);
                setTimeout(() => { if(e.parentNode) { e.remove(); spawn(); } }, 1000);
            }
            spawn();
            timerInt = setInterval(() => { time--; document.getElementById('t').innerText = time; if(time<=0) showResult("انتهاء المهمة", `قمت بتصفية ${kills} هدف`, true); }, 1000);
        }

        // --- 2. Math ---
        function loadMath(v) {
            let a=Math.floor(Math.random()*20), b=Math.floor(Math.random()*20), res=a+b, t=10;
            v.innerHTML = `<h3>أسرع حساب!</h3><h1 id="mtm">10</h1><h2>${a} + ${b} = ؟</h2><input type="number" id="ansInp"><button class="btn" id="chk">Verify ✅</button>`;
            const inp = document.getElementById('ansInp'); inp.focus();
            timerInt = setInterval(() => { t--; document.getElementById('mtm').innerText = t; if(t<=0) showResult("انتهى الوقت", `الجواب ${res}`, false); }, 1000);
            document.getElementById('chk').onclick = () => { if(parseInt(inp.value)===res) showResult("ممتاز!", "إجابة صحيحة", true); else sfx(100); };
        }

        // --- 3. Ghost (Ball) ---
        function loadBall(v) {
            let p=0, r=0; v.innerHTML = `<h3>صيد الشبح 👻</h3><div id="arena"><div id="ball"></div></div><p id="sc">أنت: 0 | آلي: 0</p>`;
            const b = document.getElementById('ball');
            function move() {
                if(currentGame !== 'ball') return;
                b.style.left = Math.random()*210+"px"; b.style.top = Math.random()*210+"px"; b.style.display="block";
                let hit = false;
                b.onclick = () => { hit=true; p++; sfx(800); b.style.display="none"; document.getElementById('sc').innerText=`أنت: ${p} | آلي: ${r}`; if(p>=15) showResult("فزت!", "أنت سريع جداً", true); else setTimeout(move, 400); };
                setTimeout(() => { if(!hit && currentGame==='ball'){ r++; document.getElementById('sc').innerText=`أنت: ${p} | آلي: ${r}`; b.style.display="none"; if(r>=15) showResult("خسرت", "الشبح أسرع منك", false); else setTimeout(move, 600); } }, 800);
            }
            move();
        }

        // --- 4. X-O ---
        function loadXO(v) {
            let b=["","","","","","","","",""], active=true;
            const draw = () => { v.innerHTML = `<h3>تحدي X-O</h3><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;">${b.map((s,i)=>`<div class="cell" onclick="go(${i})">${s}</div>`).join('')}</div>`; };
            window.go = (i) => { if(b[i]==="" && active) { b[i]="X"; check(); if(active) setTimeout(ai, 300); draw(); } };
            const ai = () => { let e=b.map((s,i)=>s===""?i:null).filter(x=>x!==null); if(e.length>0) { b[e[Math.floor(Math.random()*e.length)]]="O"; check(); draw(); } };
            const check = () => { const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; for(let p of w) if(b[p[0]] && b[p[0]]===b[p[1]] && b[p[0]]===b[p[2]]) { active=false; showResult(b[p[0]]==="X"?"فزت!":"خسرت!", "", b[p[0]]==="X"); } };
            draw();
        }

        // --- 5. Memory ---
        function loadMem(v) {
            const icons=['🍎','🍎','🍌','🍌','🍇','🍇','🍒','🍒','🍍','🍍','🥝','🥝'];
            let s=icons.sort(()=>Math.random()-0.5), open=[], count=0;
            v.innerHTML = `<h3>الذاكرة</h3><div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px;">${s.map(()=>`<div class="cell" onclick="flip(this)"></div>`).join('')}</div>`;
            window.flip = (el) => { if(open.length<2 && !el.innerText) { el.innerText = s[[...el.parentNode.children].indexOf(el)]; open.push(el); if(open.length===2) { if(open[0].innerText===open[1].innerText) { open=[]; count++; if(count===6) showResult("عبقري!", "ذاكرة قوية", true); } else { setTimeout(()=>{open[0].innerText=''; open[1].innerText=''; open=[];}, 500); } } } };
        }

        // --- 6. Speed ---
        function loadTap(v) {
            let c=0, t=5, start=false;
            v.innerHTML = `<h3>تحدي النقر (25)</h3><h1 id="ts">5</h1><button class="btn" style="height:100px" id="tp">انقر هنا!</button><h2>Clicks: <span id="tc">0</span></h2>`;
            document.getElementById('tp').onclick = () => { if(!start){ start=true; timerInt=setInterval(()=>{t--; document.getElementById('ts').innerText=t; if(t<=0){ clearInterval(timerInt); showResult(c>=25?"سريع!":"بطيء", `نقرت ${c} مرة`, c>=25); }}, 1000); } c++; document.getElementById('tc').innerText=c; sfx(500, 0.05); };
        }

        // --- 7. Numbers ---
        function loadNum(v) {
            let next=1; let ns=[1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5);
            v.innerHTML = `<h3>ترتيب الأرقام</h3><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">${ns.map(n=>`<div class="cell" onclick="numHit(this, ${n})">${n}</div>`).join('')}</div>`;
            window.numHit = (el, n) => { if(n===next) { el.style.opacity="0.3"; sfx(600); next++; if(next>9) showResult("مبروك!", "ترتيب صحيح", true); } else sfx(100); };
        }
    </script>
</body>
</html>
